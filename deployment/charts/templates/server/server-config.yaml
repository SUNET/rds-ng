apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: {{ .Values.nameSpace }}
data:
  RDS_NETWORK_SERVER_ALLOWED_ORIGINS: {{ .Values.server.allowedOrigins }}
  RDS_STORAGE_DATABASE_ENGINE: {{ .Values.server.databaseEngine }}
  RDS_STORAGE_DATABASE_SQLITE_FILE: {{ .Values.server.sqliteFile }}
  RDS_NETWORK_API_KEY: {{ .Values.server.networkApiKey }}
  RDS_AUTHORIZATION_OAUTH2_SECRETS_HOST: {{ .Values.server.oauth2.hostSecret }}
