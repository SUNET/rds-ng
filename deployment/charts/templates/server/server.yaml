apiVersion: apps/v1
kind: Deployment
metadata:
  name: rds-server
  namespace: {{ .Values.nameSpace }}
  labels:
    app: {{ .Values.appName }}
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.appName }}
      component: server
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
        component: server
    spec:
      containers:
        - name: rds-server
          image: "{{ .Values.server.image.name }}:{{ .Values.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - containerPort: 6969
          envFrom:
          - configMapRef:
              name: server-config
          - secretRef:
              name: server-secret
          

---
apiVersion: v1
kind: Service
metadata:
  name: server-service
spec:
  selector:
    app: {{ .Values.appName }}
    component: server
  ports:
    - protocol: TCP
      port: 4200
      targetPort: 6969
